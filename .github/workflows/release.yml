name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# v5.18 — opt into Node.js 24 for the JavaScript actions runtime per
# the GitHub deprecation notice (Sep 2025). GitHub is removing Node 20
# from runners in Sep 2026; setting this env var now forces every
# JavaScript action onto Node 24 even if a maintainer hasn't bumped
# their action bundle yet, eliminating the "Node.js 20 actions are
# deprecated" annotation that appeared on every release. Safe to
# remove once Node 24 becomes the runner default in mid-2026.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        # v5 ships with a Node 24 bundle. Pre-v5 (v4) was a Node 20 bundle
        # and showed up in the deprecation annotation.
        uses: actions/checkout@v5

      - name: Install Node.js
        # v5 ships with a Node 24 bundle (action runtime). Same Node 20
        # deprecation reason as checkout above.
        #
        # `node-version: 24` is the BUILD Node — the version npm scripts
        # (tsc, vite, vitest, electron-builder, sharp prebuilds) run
        # against. Bumped from 20 to 24 (current LTS, supported through
        # April 2028) so the entire workflow runs on a single Node
        # version, matching the action runtime above.
        #
        # Important: this is INDEPENDENT of the Node version Electron 33
        # bundles internally (still Node 20). electron-builder spawns the
        # Electron binary which uses its own bundled Node — the build
        # Node only runs the packaging tooling, not the app itself.
        # Verified compatible: sharp ^0.34.5 (has Node 24 Windows
        # prebuilds), electron-builder ^25 (supports Node 22+24), and
        # all the vite/vitest/tsx/esbuild line which require Node 18+.
        uses: actions/setup-node@v5
        with:
          node-version: 24
          # v5.1.6 — built-in npm cache keyed on package-lock.json. Restores
          # ~/.npm on every run; saves 60-90s of re-download per release and
          # avoids the ECONNRESET we hit on v5.1.5 when the registry blipped.
          cache: 'npm'

      - name: Install dependencies
        # v5.1.6 — npm ci is deterministic (lockfile-exact, no resolution
        # work) and roughly 2x faster than npm install. --legacy-peer-deps
        # stays because the dep tree has a known peer conflict between
        # firebase + firebase-admin transitive types; removing it would
        # need a separate migration. --prefer-offline lets the cache from
        # the previous step do the heavy lifting. PowerShell retries the
        # whole step up to 3x with exponential backoff so one transient
        # ECONNRESET doesn't kill the release.
        shell: pwsh
        run: |
          $attempt = 0
          $max = 3
          $delay = 10
          while ($attempt -lt $max) {
            $attempt++
            Write-Host "npm ci attempt $attempt of $max"
            npm ci --legacy-peer-deps --prefer-offline --no-audit --no-fund
            if ($LASTEXITCODE -eq 0) {
              Write-Host "npm ci succeeded on attempt $attempt"
              break
            }
            if ($attempt -lt $max) {
              Write-Host "npm ci failed (exit $LASTEXITCODE). Retrying in ${delay}s..."
              Start-Sleep -Seconds $delay
              $delay = $delay * 2
            } else {
              Write-Error "npm ci failed after $max attempts."
              exit 1
            }
          }

      - name: Type Check
        run: npm run lint

      - name: Run tests
        # v5.1.6 — wire tests into CI. Pre-v5.1.6 the workflow only ran
        # tsc (lint); test failures could ship to release. Vitest uses no
        # network so doesn't need the retry wrapper.
        run: npm test

      - name: Build Windows Icon (.ico)
        # Generates assets/icon.ico from the source PNG/JPEG. Must run before
        # electron-builder packs the installer — otherwise the .exe falls back
        # to the generic Electron icon. The .ico is gitignored on purpose
        # (it's a build artifact) so CI regenerates it every release.
        run: npm run icons

      - name: Build Web App
        run: npm run build

      - name: Build Server
        run: npm run build:server

      - name: Build/Release Electron App (draft for prerelease tags)
        # Tags containing a hyphen (e.g. `v3.1.0-fb-test.1`, `v3.1.0-rc.2`)
        # are treated as prereleases and produce DRAFT GitHub Releases.
        # Plain SemVer tags (e.g. `v3.1.0`) publish normally. This lets the
        # Firebase migration work tag from a feature branch without
        # accidentally cutting a public release.
        if: contains(github.ref_name, '-')
        run: npx --no-install electron-builder --windows --publish always --config.releaseType=draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build/Release Electron App
        # Direct electron-builder call. The historically-used
        # `samuelmeuli/action-electron-builder@v1` is unmaintained (last
        # release 2021) and was forced onto Node 24 by the GitHub runner;
        # invoking electron-builder ourselves removes that wrapper and
        # gives us a clearer build log if NSIS rejects a custom include.
        # `--publish always` uploads the artifacts to the GitHub Release
        # for the tag that triggered the workflow.
        if: ${{ !contains(github.ref_name, '-') }}
        run: npx --no-install electron-builder --windows --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Once a code-signing cert is provisioned (e.g. via SignPath
          # Foundation for OSS), set CSC_LINK and CSC_KEY_PASSWORD
          # repository secrets and electron-builder will sign
          # automatically. Until then the installer ships unsigned and
          # Windows SmartScreen will display a warning.

      - name: Publish SHA-256 hashes
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist-electron -Filter "*.exe" -File
          $sha = foreach ($f in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $f.FullName).Hash.ToLower()
            "$hash  $($f.Name)"
          }
          $sha | Out-File -FilePath dist-electron/SHA256SUMS.txt -Encoding utf8
          Write-Host "Generated SHA256SUMS.txt:"
          Get-Content dist-electron/SHA256SUMS.txt

      - name: Upload SHA256SUMS to release
        # Major-version pin: lets security/Node-version patches in the
        # v2 line flow in automatically. The workflow-level
        # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 env var above forces this
        # action onto Node 24 even on releases where the bundled Node
        # version hasn't been bumped yet.
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/SHA256SUMS.txt
          token: ${{ secrets.GITHUB_TOKEN }}
